<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hanbee Management Portal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--brand:#1565C0;--bg:#f4f6f9;--surface:#fff;--surface2:#f8f9fc;--border:#e2e6ed;--border2:#d0d7e3;--text:#1a1f2e;--text2:#5a6478;--text3:#9aa3b5;--green:#1a7a4a;--green-bg:#eaf6f0;--red:#c0392b;--red-bg:#fdf0ee;--amber:#92600a;--amber-bg:#fdf5e6;--radius:10px;--radius-lg:14px;--shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
input,select,textarea{padding:8px 11px;font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;width:100%;font-family:'DM Sans',sans-serif;transition:border .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--brand);background:#fff;}
textarea{resize:vertical;min-height:55px;}
.btn{padding:8px 16px;font-size:13px;font-weight:500;background:#fff;border:1px solid var(--border2);border-radius:8px;color:var(--text);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn:hover{background:var(--surface2);border-color:var(--brand);}
.btn-brand{background:var(--brand);color:#fff;border-color:transparent;}
.btn-brand:hover{opacity:.9;border-color:transparent;}
.btn-success{background:var(--green-bg);color:var(--green);border-color:transparent;}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:transparent;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-w{width:100%;margin-top:10px;}
.del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0 3px;}
.del:hover{color:var(--red);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:.9rem;box-shadow:var(--shadow);}
.metric{background:var(--surface2);border-radius:var(--radius);padding:.85rem 1rem;border:1px solid var(--border);}
.ml{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.mv{font-size:18px;font-weight:600;color:var(--text);}
.mv.g{color:var(--green);}.mv.r{color:var(--red);}.mv.a{color:var(--amber);}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:.9rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:.9rem;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:.9rem;}
.fr{display:grid;gap:8px;margin-bottom:10px;}
.c2{grid-template-columns:repeat(2,1fr);}
.c3{grid-template-columns:repeat(3,1fr);}
.c4{grid-template-columns:2fr 1fr 1fr auto;}
.c5{grid-template-columns:2fr 1fr 1fr 1fr auto;}
.st{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:11px;}
.str{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
th{text-align:left;padding:7px 8px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
td{padding:8px;color:var(--text);border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.bx{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-block;}
.xp{background:var(--green-bg);color:var(--green);}
.xpn{background:var(--amber-bg);color:var(--amber);}
.xo{background:var(--red-bg);color:var(--red);}
.xd{background:var(--green-bg);color:var(--green);}
.xdu{background:var(--amber-bg);color:var(--amber);}
.xug{background:var(--red-bg);color:var(--red);}
.xi{background:#e6f4ff;color:#0055a5;}
.xout{background:var(--red-bg);color:var(--red);}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:1rem;flex-wrap:wrap;}
.tab{font-size:12px;padding:8px 11px;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600;}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.plr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.plr:last-child{border-bottom:none;}
.cw{position:relative;width:100%;height:200px;margin-top:.8rem;}
.cb{background:var(--surface2);border-radius:var(--radius);padding:.85rem;margin-top:8px;border:1px solid var(--border);}
.cl{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border);}
.cl:last-child{border-bottom:none;font-weight:600;}
.pw{height:8px;background:var(--surface2);border-radius:8px;overflow:hidden;margin-top:4px;border:1px solid var(--border);}
.pf{height:100%;border-radius:8px;transition:width .4s;}
.nc{background:var(--surface2);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;border:1px solid var(--border);}
.cp{font-family:'DM Mono',monospace;font-size:12px;background:var(--surface2);padding:3px 10px;border-radius:6px;border:1px solid var(--border2);color:var(--text);}
.err{font-size:12px;color:var(--red);margin-top:5px;}
.ok{font-size:12px;color:var(--green);margin-top:5px;}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;}
.fg{margin-bottom:12px;}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d2f6e,#1565C0 50%,#1976D2);padding:1rem;}
.login-card{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.fallback{width:88px;height:88px;border-radius:16px;background:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;}
#app-shell{display:none;min-height:100vh;flex-direction:column;}
.topnav{background:#fff;border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo-fb{width:32px;height:32px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.nav-badge{font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;color:var(--text2);}
.main-content{flex:1;padding:1.25rem 1.5rem;max-width:1400px;width:100%;margin:0 auto;}
.portal-header{background:linear-gradient(135deg,#0d2f6e,#1565C0);color:#fff;padding:1.5rem;border-radius:var(--radius-lg);margin-bottom:1.1rem;}
.role-switch{display:flex;gap:8px;margin-bottom:1rem;}
.role-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:var(--radius);background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;text-align:center;}
.role-btn.active{border-color:var(--brand);background:#e8f0fe;color:var(--brand);}
.footer{text-align:center;padding:1rem;font-size:11px;color:var(--text3);border-top:1px solid var(--border);background:#fff;}
.footer a{color:var(--brand);text-decoration:none;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
@media(max-width:700px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(2,1fr);}.c4,.c5{grid-template-columns:1fr 1fr;}.main-content{padding:.85rem;}}

html.force-dark{--bg:#0f1117!important;--surface:#1a1d27!important;--surface2:#22253a!important;--border:#2d3147!important;--text:#e8eaf0!important;--text2:#9099b5!important;--text3:#5a6280!important;--green:#4ade80!important;--green-bg:#0d2e1a!important;--red:#f87171!important;--red-bg:#2a0f0f!important;--amber:#fbbf24!important;--amber-bg:#2a1e08!important;}
html.force-dark .login-page{background:linear-gradient(135deg,#060810,#0d1225 50%,#111828)!important;}
html.force-dark .login-card{background:#1a1d27!important;}
html.force-dark .topnav,.force-dark .footer{background:#1a1d27!important;border-color:#2d3147!important;}
html.force-dark .card{background:#1a1d27!important;border-color:#2d3147!important;}
html.force-dark .metric{background:#22253a!important;}
html.force-dark input,html.force-dark select,html.force-dark textarea{background:#22253a!important;border-color:#2d3147!important;color:#e8eaf0!important;}
html.force-dark .tab.active{color:#60a5fa!important;border-bottom-color:#60a5fa!important;}
html.force-dark tr:hover td{background:#22253a!important;}
html.force-dark .btn:not(.btn-brand):not(.btn-success):not(.btn-danger){background:#22253a!important;color:#e8eaf0!important;border-color:#3a3f5c!important;}
html.force-dark .portal-header{background:linear-gradient(135deg,#060d1f,#0d1f3c)!important;}
html.force-dark .role-btn{background:#22253a!important;color:#9099b5!important;border-color:#2d3147!important;}
html.force-dark .role-btn.active{background:#1e2d4a!important;color:#60a5fa!important;border-color:#60a5fa!important;}

/* ═══════════════════ PREMIUM UPGRADES ═══════════════════ */
:root {
  --brand-gradient: linear-gradient(135deg, var(--brand) 0%, #1976D2 100%);
  --card-hover: 0 4px 20px rgba(0,0,0,.10);
  --radius-xl: 18px;
}
.card { transition: box-shadow .2s; }
.card:hover { box-shadow: var(--card-hover); }
.metric {
  transition: transform .15s, box-shadow .15s;
  cursor: default;
}
.metric:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.10); }
.btn { transition: all .15s; }
.btn-brand:hover { filter: brightness(1.08); }
.login-card { 
  border-radius: 24px;
  box-shadow: 0 24px 80px rgba(0,0,0,.28);
  padding: 2.5rem 2.25rem;
}
.tabs { border-bottom: 2px solid var(--border); gap: 0; }
.tab { border-radius: 6px 6px 0 0; padding: 9px 14px; font-size: 12.5px; }
.tab:hover { background: var(--surface2); color: var(--text); }
.tab.active { 
  background: var(--surface);
  color: var(--brand);
  border-bottom: 3px solid var(--brand);
  font-weight: 700;
}
.portal-header {
  border-radius: 16px;
  padding: 1.5rem 1.75rem;
}
input:focus, select:focus, textarea:focus {
  box-shadow: 0 0 0 3px rgba(21,101,192,.12);
}
.bx { border-radius: 6px; font-size: 10.5px; }
table { font-size: 13px; }
th { font-size: 10.5px; color: var(--text2); letter-spacing: .06em; }

/* ─── Role switch pill design ─── */
.role-switch {
  display: flex;
  background: var(--surface2);
  border-radius: 12px;
  padding: 4px;
  gap: 3px;
  margin-bottom: 1.25rem;
  border: 1px solid var(--border);
  flex-wrap: wrap;
}
.role-btn {
  flex: 1;
  min-width: 60px;
  padding: 8px 6px;
  border: none;
  border-radius: 9px;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  transition: all .15s;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
}
.role-btn:hover { background: var(--surface); color: var(--text); }
.role-btn.active {
  background: #fff;
  color: var(--brand);
  font-weight: 700;
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}
html.force-dark .role-btn.active { background: #2d3147 !important; }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ─── Nav upgrade ─── */
.topnav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,.06);
}

/* ─── Portal header gradients per role ─── */
.portal-header.hr-portal {
  background: linear-gradient(135deg, #064e3b, #059669) !important;
}
.portal-header.mkt-portal {
  background: linear-gradient(135deg, #4c1d95, #7c3aed) !important;
}
.portal-header.investor-portal {
  background: linear-gradient(135deg, #1e3a5f, #2563eb) !important;
}

/* ─── Investor card highlight ─── */
.inv-card {
  border-left: 4px solid var(--brand);
}

@media(max-width:900px){
  .g4 { grid-template-columns: repeat(2, 1fr); }
  .login-card { padding: 2rem 1.5rem; }
}
@media(max-width:500px){
  .g4, .g3 { grid-template-columns: 1fr 1fr; }
  .g2 { grid-template-columns: 1fr; }
  .tabs { gap: 0; }
  .tab { padding: 7px 8px; font-size: 11px; }
}

</style>
</head>
<body>
<div id="login-screen">
  <div class="login-page">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div style="display:flex;justify-content:center;margin-bottom:10px"><div class="fallback" id="login-fb">HB</div></div>
        <div style="font-size:20px;font-weight:700;color:var(--text)" id="login-cname">Hanbee Technologies Pvt. Ltd.</div>

</div>

['clients','recurring','projects','leaves','attendance','docs','purchaseOrders','quotes','expenses','appraisals','holidays','exits','timeLogs','wfhRequests','pettyCash','assets','training','itDeclarations','statutoryLog','campaigns','leads','adSpend','investors'].forEach(k=>{if(!DB[k])DB[k]=[];});
if(!DB.brand)DB.brand=DEFDB.brand;
let USER=null;
var loginRole='employee';

function applyBrand(){
  document.documentElement.style.setProperty('--brand',DB.brand.color);
  const init=(DB.brand.shortName||DB.brand.companyName).split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  g('login-cname').textContent=DB.brand.companyName;
  g('login-fb').textContent=init;
  g('login-fb').style.background=DB.brand.color;
  g('nav-cname').textContent=DB.brand.shortName||DB.brand.companyName;
  g('footer-co').textContent=DB.brand.companyName;
  if(g('footer-web')){g('footer-web').href=DB.brand.website;g('footer-web').textContent=DB.brand.website.replace('https://','');}
  const nl=g('nav-logo');
  if(DB.brand.logoUrl){nl.innerHTML=`<img src="${DB.brand.logoUrl}" style="width:32px;height:32px;object-fit:contain;border-radius:6px" onerror="this.outerHTML='<div class=nav-logo-fb style=background:${DB.brand.color}>${init}</div>'">`;}
  else{nl.innerHTML=`<div class="nav-logo-fb" style="background:${DB.brand.color}">${init}</div>`;}
}

function setRole(r,el){loginRole=r;document.querySelectorAll('.role-btn').forEach(function(b){b.classList.remove('active');});el.classList.add('active');renderLoginForm();}

function renderLoginForm(){
  var f=g('login-form'),h=g('login-hint'),b=DB.brand;
  if(loginRole==='marketing'){
    f.innerHTML='<div class="fg"><label>Marketing Manager Code</label><input id="lc" placeholder="MKT001" style="font-family:monospace" onkeydown="if(event.key===\'Enter\')doLogin()"/></div><div id="lerr" class="err"></div><button class="btn btn-brand btn-w" style="background:'+b.color+'" onclick="doLogin()">Marketing Login</button>';
    h.innerHTML='Default: <code>MKT001</code>';
    return;}
  if(loginRole==='marketing'){/* handled below via manager */}
  if(loginRole==='manager'||loginRole==='marketing'){
    f.innerHTML='<div class="fg"><label>Manager Code</label><input id="lc" placeholder="FIN001, HR001 or MKT001" style="font-family:monospace" onkeydown="if(event.key===\'Enter\')doLogin()"/></div>'
    +'<div class="fg"><label>PIN</label><input type="password" id="lpin" placeholder="4-digit PIN" maxlength="6" style="font-family:monospace;letter-spacing:4px" onkeydown="if(event.key===\'Enter\')doLogin()"/></div>'+'<div style="font-size:11px;color:var(--text2);margin-top:-6px;margin-bottom:8px">First time? Enter any 4-digit PIN to set it.</div>'
    +'<div id="lerr" class="err"></div>'
    +'<button class="btn btn-brand btn-w" style="background:'+b.color+'" onclick="doLogin()">Manager Login</button>';
    h.innerHTML='Finance: <code>FIN001</code> &nbsp; HR: <code>HR001</code> &nbsp; Marketing: <code>MKT001</code>';
    return;}
  if(loginRole==='employee'){
    f.innerHTML='<div class="fg"><label>Your Name</label><input id="ln" placeholder="Full name"/></div>'
    +'<div class="fg"><label>Employee Code</label><input id="lc" placeholder="e.g. EMP001" style="font-family:monospace" onkeydown="if(event.key===\'Enter\')doLogin()"/></div>'
    +'<div class="fg"><label>PIN</label><input type="password" id="lpin" placeholder="4-digit PIN" maxlength="6" style="font-family:monospace;letter-spacing:4px" onkeydown="if(event.key===\'Enter\')doLogin()"/></div>'
    +'<div style="font-size:11px;color:var(--text2);margin-top:-6px;margin-bottom:8px">First time? Enter any 4-digit PIN to set it.</div>'
    +'<div id="lerr" class="err"></div>'
    +'<button class="btn btn-brand btn-w" style="background:'+b.color+'" onclick="doLogin()">Login to Portal</button>';
    h.innerHTML='Demo: <code>EMP001</code> or <code>EMP002</code>';
    return;}
  f.innerHTML='<div class="fg"><label>Admin Code</label><input id="lc" placeholder="ADMIN123" style="font-family:monospace" onkeydown="if(event.key===\'Enter\')doLogin()"/></div>'
  +'<div class="fg"><label>PIN</label><input type="password" id="lpin" placeholder="4-digit PIN" maxlength="6" style="font-family:monospace;letter-spacing:4px" onkeydown="if(event.key===\'Enter\')doLogin()"/></div>'+'<div style="font-size:11px;color:var(--text2);margin-top:-6px;margin-bottom:8px">First time? Enter any 4-digit PIN to set it.</div>'
  +'<div id="lerr" class="err"></div>'
  +'<button class="btn btn-brand btn-w" style="background:'+b.color+'" onclick="doLogin()">Admin Login</button>';
  h.innerHTML='Default: <code>ADMIN123</code> &nbsp; <button onclick="resetAndReload()" style="font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline">Reset DB</button>';}

function doLogin(){
  var code=(g('lc')?g('lc').value:'').trim().toUpperCase();
  if(loginRole==='marketing'){
    if(!code){g('lerr').textContent='Enter marketing code.';return;}
    var mkt=DB.empUsers.find(function(e){return e.code===code&&e.role==='marketing';});
    if(!mkt&&code==='MKT001'){mkt=DEFDB.empUsers.find(function(e){return e.role==='marketing';})||{id:6,name:'Marketing Manager',code:'MKT001',role:'marketing',dept:'Marketing'};}
    if(!mkt){g('lerr').textContent='Invalid marketing code.';return;}
    USER=mkt;S.set('hanbee_user',USER);showMarketingDash();return;}
  if(loginRole==='manager'||loginRole==='marketing'){
    if(!code){g('lerr').textContent='Enter manager code.';return;}
    var pin=(g('lpin')?g('lpin').value:'').trim();
    if(!pin||pin.length<4){g('lerr').textContent='Enter a 4-digit PIN.';return;}
    var mgr=DB.empUsers.find(function(e){return e.code===code&&(e.role==='finance'||e.role==='hr'||e.role==='marketing');});
    if(!mgr&&(code==='FIN001'||code==='HR001')){mgr=DEFDB.empUsers.find(function(e){return e.code===code;})||null;}
    if(!mgr&&code==='MKT001'){mgr=DEFDB.empUsers.find(function(e){return e.role==='marketing';})||{id:6,name:'Marketing Manager',code:'MKT001',role:'marketing',dept:'Marketing'};}
    if(!mgr){g('lerr').textContent='Invalid manager code.';return;}
    // PIN check
    var mgrPins=getPins();var mgrPinKey='mgr_'+mgr.id;
    if(!mgrPins[mgrPinKey]){
      mgrPins[mgrPinKey]=pin;savePins(mgrPins);
    } else if(mgrPins[mgrPinKey]!==pin){
      g('lerr').textContent='Incorrect PIN. Try again.';return;}
    USER=mgr;USER.loginTime=Date.now();S.set('hanbee_user',USER);
    if(mgr.role==='marketing'){showMarketingDash();return;}
    showManagerDash();return;}
  if(loginRole==='employee'){
    var nm=(g('ln')?g('ln').value:'').trim();
    var pin=(g('lpin')?g('lpin').value:'').trim();
    if(!nm||!code){g('lerr').textContent='Enter your name and employee code.';return;}
    if(!pin||pin.length<4){g('lerr').textContent='Enter a 4-digit PIN.';return;}
    var emp=DB.empUsers.find(function(e){return e.code===code&&e.role==='employee';});
    if(!emp&&(code==='EMP001'||code==='EMP002')){emp=DEFDB.empUsers.find(function(e){return e.code===code;})||null;}
    if(!emp){g('lerr').textContent='Invalid employee code.';return;}
    // PIN check
    var pins=getPins();
    var empPinKey='emp_'+emp.id;
    if(!pins[empPinKey]){
      // First login - set PIN
      pins[empPinKey]=pin;
      savePins(pins);
      USER=emp;USER.loginTime=Date.now();S.set('hanbee_user',USER);showEmpPortal();return;
    }
    if(pins[empPinKey]!==pin){g('lerr').textContent='Incorrect PIN. Try again.';return;}
    USER=emp;USER.loginTime=Date.now();S.set('hanbee_user',USER);showEmpPortal();return;}
  if(!code){g('lerr').textContent='Enter admin code.';return;}
  var pin=(g('lpin')?g('lpin').value:'').trim();
  if(!pin||pin.length<4){g('lerr').textContent='Enter a 4-digit PIN.';return;}
  var adm=DB.empUsers.find(function(e){return e.code===code&&e.role==='admin';});
  if(!adm&&code==='ADMIN123'){adm=DEFDB.empUsers.find(function(e){return e.role==='admin';});}
  if(!adm){g('lerr').textContent='Invalid code. Try clearing browser data if issue persists.';return;}
  // PIN check
  var admPins=getPins();var admPinKey='admin_'+adm.id;
  if(!admPins[admPinKey]){
    admPins[admPinKey]=pin;savePins(admPins);
  } else if(admPins[admPinKey]!==pin){
    g('lerr').textContent='Incorrect PIN. Try again.';return;}
  USER=adm;USER.loginTime=Date.now();S.set('hanbee_user',USER);showAdminDash();}

function logout(){USER=null;S.set('hanbee_user',null);g('app-shell').style.display='none';g('login-screen').style.display='block';renderLoginForm();}

function showEmpPortal(){
  g('login-screen').style.display='none';g('app-shell').style.display='flex';
  g('nav-badge').textContent=USER.name+' · '+USER.dept;g('nav-sub').textContent='Employee Portal';
  renderEmpPortal();
}

function renderEmpPortal(){
  var my=DB.expenses.filter(function(e){return e.empId===USER.id;});
  var myLeaves=DB.leaves.filter(function(l){return l.empId===USER.id;});
  var total=my.reduce(function(s,e){return s+e.amount;},0);
  var pend=my.filter(function(e){return e.status==='pending';});
  var appr=my.filter(function(e){return e.status==='approved';});
  var rej=my.filter(function(e){return e.status==='rejected';});
  var b=DB.brand;
  var h='';
  h+='<div class="portal-header">';
  h+='<div style="font-size:18px;font-weight:600;margin-bottom:2px">Hello, '+USER.name+'!</div>';
  h+='<div style="font-size:13px;opacity:.85">'+USER.dept+' &middot; Code: <span style="font-family:monospace;background:rgba(255,255,255,.15);padding:1px 8px;border-radius:4px">'+USER.code+'</span></div>';
  h+='</div>';
  h+='<div class="g4">';
  h+='<div class="metric"><div class="ml">Total submitted</div><div class="mv">'+fmt(total)+'</div></div>';
  h+='<div class="metric"><div class="ml">Pending</div><div class="mv a">'+fmt(pend.reduce(function(s,e){return s+e.amount;},0))+' ('+pend.length+')</div></div>';
  h+='<div class="metric"><div class="ml">Approved</div><div class="mv g">'+fmt(appr.reduce(function(s,e){return s+e.amount;},0))+' ('+appr.length+')</div></div>';
  h+='<div class="metric"><div class="ml">Leave balance</div><div class="mv">'+(12-myLeaves.filter(function(l){return l.status==='approved';}).length)+' days left</div></div>';
  h+='</div>';
  h+='<div class="tabs">';
  h+='<button class="tab active" onclick="eT(\'submit\',this)">Submit Expense</button>';
  h+='<button class="tab" onclick="eT(\'history\',this)">My Claims</button>';
  h+='<button class="tab" onclick="eT(\'leaves\',this)">My Leaves</button>';
  h+='<button class="tab" onclick="eT(\'myatt\',this)">My Attendance</button>';
  h+='<button class="tab" onclick="eT(\'wfh\',this)">WFH Request</button>';
  h+='<button class="tab" onclick="eT(\'myslip\',this)">My Salary Slips</button>';
  h+='<button class="tab" onclick="eT(\'itdecl\',this)">IT Declaration</button>';
  h+='<button class="tab" onclick="eT(\'settings\',this)">Settings</button>';
  h+='</div>';
  h+='<div id="etc"></div>';
  g('mc').innerHTML=h;
  eTContent('submit',my,appr.length,rej.length,myLeaves);}


function eT(t,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const my=DB.expenses.filter(e=>e.empId===USER.id);
  const ml=DB.leaves.filter(l=>l.empId===USER.id);
  eTContent(t,my,my.filter(e=>e.status==='approved').length,my.filter(e=>e.status==='rejected').length,ml);}

function eTContent(t,my,apprCnt,rejCnt,myLeaves){
  var el=g('etc');if(!el)return;
  var b=DB.brand;
  if(t==='submit'){
    var projOpts=DB.projects.map(function(p){return '<option value="'+p.id+'">'+p.name+'</option>';}).join('');
    var warnHTML='';
    if(apprCnt>0)warnHTML+='<div class="card" style="border-color:#b7dfca"><div style="color:var(--green);font-weight:600">'+apprCnt+' expense(s) approved -- contact finance for reimbursement</div></div>';
    if(rejCnt>0)warnHTML+='<div class="card" style="border-color:#f5c6c2"><div style="color:var(--red);font-weight:600">'+rejCnt+' expense(s) rejected -- see history</div></div>';
    el.innerHTML='<div class="card"><div class="st">New Expense Claim</div>'
      +'<div class="fr c2"><div><label>Description *</label><input id="ed" placeholder="What was this expense for?"/></div>'

      +'<div><label>Project (optional)</label><select id="ep"><option value="">-- No project --</option>'+projOpts+'</select></div>'
      +'<div><label>Date</label><input type="date" id="edt" value="'+tod()+'"/></div></div>'
      +'<div><label>Notes (optional)</label><input id="en" placeholder="Extra details"/></div>'
      +'<div id="emsg"></div>'
      +'<button class="btn btn-brand btn-w" style="background:'+b.color+'" onclick="submitExp()">Submit Expense Claim</button></div>'
      +warnHTML;
    return;}

    var rows='';
    my.forEach(function(x){
      var proj=DB.projects.find(function(p){return p.id==x.projId;});

    var elU=getLeaveUsed(USER.id,'Earned Leave'),emU=getLeaveUsed(USER.id,'Emergency Leave');

function submitExp(){
  const desc=(g('ed').value||'').trim(),amount=parseFloat(g('ea').value),cat=g('ec').value,date=g('edt').value,notes=(g('en').value||'').trim(),projId=g('ep').value;
  const msg=g('emsg');
  if(!desc){msg.className='err';msg.textContent='Enter description.';return;}
  if(!amount||amount<=0){msg.className='err';msg.textContent='Enter valid amount.';return;}
  DB.expenses.unshift({id:Date.now(),empId:USER.id,empName:USER.name,dept:USER.dept,desc,amount,cat,date,notes,projId,status:'pending',submittedOn:tod()});
  saveDB();msg.className='ok';msg.textContent='Submitted successfully!';
  g('ed').value='';g('ea').value='';g('en').value='';g('edt').value=tod();
  setTimeout(()=>renderEmpPortal(),900);}

function delMyExp(id){DB.expenses=DB.expenses.filter(x=>x.id!==id);saveDB();renderEmpPortal();}

function applyLeave(){
  const from=g('lf').value,to=g('lt').value,type=g('ltype').value,reason=(g('lreason').value||'').trim();
  const msg=g('lmsg');
  if(!from||!to){msg.style.color='var(--red)';msg.textContent='Select dates.';return;}
  DB.leaves.unshift({id:Date.now(),empId:USER.id,empName:USER.name,dept:USER.dept,from,to,type,reason,status:'pending',appliedOn:tod()});
  saveDB();msg.style.color='var(--green)';msg.textContent='Leave application submitted!';
  g('lreason').value='';setTimeout(()=>renderEmpPortal(),900);}

function changeCode(){
  const old=(g('sc-old').value||'').trim().toUpperCase();
  const nw=(g('sc-new').value||'').trim().toUpperCase();
  const msg=g('sc-msg');
  if(!old||!nw){msg.style.color='var(--red)';msg.textContent='Both fields required.';return;}
  if(nw.length<4){msg.style.color='var(--red)';msg.textContent='Min 4 characters.';return;}
  if(old!==USER.code){msg.style.color='var(--red)';msg.textContent='Current code incorrect.';return;}
  if(DB.empUsers.find(e=>e.code===nw&&e.id!==USER.id)){msg.style.color='var(--red)';msg.textContent='Code already taken.';return;}
  const emp=DB.empUsers.find(e=>e.id===USER.id);if(emp)emp.code=nw;USER.code=nw;
  S.set('hanbee_user',USER);saveDB();
  msg.style.color='var(--green)';msg.textContent='Code updated! New code: '+nw;}

function changePIN(){
  var pins=getPins();
  var key='emp_'+USER.id;
  var oldPin=(g('pin-old')?g('pin-old').value||'':'');
  var newPin=(g('pin-new')?g('pin-new').value||'':'');
  var confPin=(g('pin-conf')?g('pin-conf').value||'':'');
  var msg=g('pin-msg');
  if(!msg)return;
  if(newPin.length<4){msg.style.color='var(--red)';msg.textContent='PIN must be at least 4 digits.';return;}
  if(newPin!==confPin){msg.style.color='var(--red)';msg.textContent='PINs do not match.';return;}
  if(!/^\d+$/.test(newPin)){msg.style.color='var(--red)';msg.textContent='PIN must be digits only.';return;}
  if(pins[key]&&oldPin!==pins[key]){msg.style.color='var(--red)';msg.textContent='Current PIN is incorrect.';return;}
  pins[key]=newPin;
  savePins(pins);
  msg.style.color='var(--green)';msg.textContent='PIN '+(oldPin?'updated':'set')+' successfully! Use it next time you log in.';
  ['pin-old','pin-new','pin-conf'].forEach(function(id){if(g(id))g(id).value='';});
}

function tMktOverview(){
  var tB=DB.campaigns.reduce(function(s,c){return s+c.budget;},0);
  var tS=DB.campaigns.reduce(function(s,c){return s+c.spent;},0);
  var tL=DB.campaigns.reduce(function(s,c){return s+c.leads;},0);
  var tC=DB.campaigns.reduce(function(s,c){return s+c.conversions;},0);
  var tR=DB.campaigns.reduce(function(s,c){return s+c.revenue;},0);
  var roi=tS>0?Math.round((tR-tS)/tS*100):0;
  var cpl=tL>0?Math.round(tS/tL):0;
  var convRate=tL>0?Math.round(tC/tL*100):0;
  var topCamp=DB.campaigns.sort(function(a,b){return b.revenue-a.revenue;})[0];
  var h='<div class="g4">';
  h+='<div class="metric"><div class="ml">Total Budget</div><div class="mv">'+fmt(tB)+'</div></div>';
  h+='<div class="metric"><div class="ml">Total Spent</div><div class="mv r">'+fmt(tS)+'</div></div>';
  h+='<div class="metric"><div class="ml">Total Leads</div><div class="mv a">'+tL+'</div></div>';
  h+='<div class="metric"><div class="ml">Total Revenue</div><div class="mv g">'+fmt(tR)+'</div></div>';
  h+='</div>';
  h+='<div class="g4">';
  h+='<div class="metric"><div class="ml">ROI</div><div class="mv '+(roi>=0?'g':'r')+'">'+(roi>=0?'+':'')+roi+'%</div></div>';
  h+='<div class="metric"><div class="ml">Cost per Lead</div><div class="mv">'+fmt(cpl)+'</div></div>';
  h+='<div class="metric"><div class="ml">Conversion Rate</div><div class="mv g">'+convRate+'%</div></div>';
  h+='<div class="metric"><div class="ml">Active Campaigns</div><div class="mv">'+DB.campaigns.filter(function(c){return c.status==='active';}).length+'</div></div>';
  h+='</div>';
  if(topCamp){h+='<div class="card"><div class="st">Top Performing Campaign</div>';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
    h+='<div><div style="font-size:15px;font-weight:600">'+topCamp.name+'</div>';
    h+='<div style="font-size:12px;color:var(--text2);margin-top:3px">'+topCamp.channel+' · '+topCamp.leads+' leads · '+topCamp.conversions+' conversions</div></div>';
    h+='<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:var(--green)">'+fmt(topCamp.revenue)+'</div>';
    h+='<div style="font-size:11px;color:var(--text2)">Revenue generated</div></div></div></div>';}

  if(pLeads.length){h+='<div class="card"><div class="st">New Leads ('+pLeads.length+')</div>';

    h+='</div>';}

function tBud(){
  const cats=['Salary','Rent','Utilities','Marketing','Travel','Supplies','Other'];

  const tb=Object.values(DB.budgets).reduce((s,v)=>s+v,0);const ts=Object.keys(DB.budgets).reduce((s,k)=>s+(act[k]||0),0);
  return`<div class="g3"><div class="metric"><div class="ml">Total Budgeted</div><div class="mv">${fmt(tb)}</div></div>
  <div class="metric"><div class="ml">Total Spent</div><div class="mv r">${fmt(ts)}</div></div>

function calcMargin(){
  const cl=g('mg-cl').value;const cost=parseFloat(g('mg-cost').value)||0;const el=g('mg-result');
  if(!cl){el.innerHTML='';return;}
  const clientRevenue={};DB.invoices.filter(i=>i.status==='paid').forEach(i=>clientRevenue[i.client]=(clientRevenue[i.client]||0)+i.amount);
  const rev=clientRevenue[cl]||0;const profit=rev-cost;const margin=rev>0?Math.round(profit/rev*100):0;
  el.innerHTML=`<div style="background:${margin>30?'var(--green-bg)':margin>0?'var(--amber-bg)':'var(--red-bg)'};border-radius:8px;padding:.6rem 1rem;font-size:13px;width:100%">
    <div style="font-weight:600;font-size:15px;color:${margin>30?'var(--green)':margin>0?'var(--amber)':'var(--red)'}">Margin: ${margin}%</div>
    <div style="color:var(--text2)">Revenue: ${fmt(rev)} · Cost: ${fmt(cost)} · Profit: ${fmt(profit)}</div>
  </div>`;}

// ── CALCULATORS ──
function cGST(){
  const amt=parseFloat(g('gamt').value)||0,rate=parseFloat(g('grt').value),type=g('gtp').value,el=g('gres');
  if(!amt){el.style.display='none';return;}
  let base,gst,tot;if(type==='excl'){base=amt;gst=amt*rate/100;tot=amt+gst;}else{tot=amt;base=amt/(1+rate/100);gst=amt-base;}
  el.style.display='block';
  el.innerHTML=`<div class="cl"><span style="color:var(--text2)">Base</span><span>${fmt(base)}</span></div>
  <div class="cl"><span style="color:var(--text2)">CGST (${rate/2}%)</span><span>${fmt(gst/2)}</span></div>
  <div class="cl"><span style="color:var(--text2)">SGST (${rate/2}%)</span><span>${fmt(gst/2)}</span></div>
  <div class="cl"><span>Total</span><span>${fmt(tot)}</span></div>`;}

function cTDS(){
  const amt=parseFloat(g('tamt').value)||0,sec=g('tsec').value,el=g('tres');
  if(!amt){el.style.display='none';return;}
  const rm={'1':1,'2':2,'10':10,'10r':10,'2r':2,'30':30};const rate=rm[sec]||10;const tds=amt*rate/100;
  el.style.display='block';
  el.innerHTML=`<div class="cl"><span style="color:var(--text2)">Gross</span><span>${fmt(amt)}</span></div>
  <div class="cl"><span style="color:var(--text2)">TDS @ ${rate}%</span><span style="color:var(--red)">${fmt(tds)}</span></div>
  <div class="cl"><span>Net payable</span><span style="color:var(--green)">${fmt(amt-tds)}</span></div>`;}

// ── CHARTS ──
function mkC(id,isI){
  const canvas=g(id);if(!canvas)return;
  const a=Array(12).fill(0),b=Array(12).fill(0);
  if(isI){DB.invoices.filter(i=>i.status==='paid').forEach(i=>a[new Date(i.date).getMonth()]+=i.amount);DB.bizExp.forEach(e=>b[new Date(e.date).getMonth()]+=e.amount);}
  else{DB.cashflow.filter(x=>x.type==='in').forEach(x=>a[new Date(x.date).getMonth()]+=x.amount);DB.cashflow.filter(x=>x.type==='out').forEach(x=>b[new Date(x.date).getMonth()]+=x.amount);}
  if(CH[id])CH[id].destroy();
  CH[id]=new Chart(canvas,{type:'bar',data:{labels:MON,datasets:[{label:'In',data:a,backgroundColor:DB.brand.color,borderRadius:4},{label:'Out',data:b,backgroundColor:'#e74c3c',borderRadius:4}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
  scales:{x:{grid:{display:false},ticks:{font:{size:10},autoSkip:false,maxRotation:0}},
  y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{callback:v=>'₹'+Math.round(v/1000)+'k',font:{size:10}}}}}});}

  else if(type==='cashflow'){fn='cashflow.csv';rows=[['Description','Type','Amount','Date'],...DB.cashflow.map(x=>[x.desc,x.type,x.amount,x.date])];}
  else if(type==='payroll'){fn='payroll.csv';rows=[['Name','Department','Monthly','Annual','Status'],...DB.employees.map(e=>[e.name,e.dept,e.salary||0,(e.salary||0)*12,e.status])];}

function saveAppraisal(){
  const empId=parseInt(g('ap-emp').value),newSal=parseFloat(g('ap-sal').value),from=g('ap-from').value,rating=parseInt(g('ap-rating').value),notes=(g('ap-notes').value||'').trim();

  const emp=DB.employees.find(e=>e.id===empId);if(!emp)return;
  const oldSal=emp.salary||0;const hike=oldSal?Math.round((newSal-oldSal)/oldSal*100):0;
  DB.appraisals.unshift({id:Date.now(),empId,empName:emp.name,dept:emp.dept,oldSalary:oldSal,newSalary:newSal,from,rating,notes,date:tod()});
  emp.salary=newSal;saveDB();
  msg.style.color='var(--green)';msg.textContent=`Appraisal saved! Salary updated from ${fmt(oldSal)} to ${fmt(newSal)} (${hike>0?'+':''}${hike}% hike).`;
  setTimeout(()=>renderTab('appraisal'),1200);}

function calcWorkingDays(){
  const y=now.getFullYear(),m=now.getMonth();
  const days=new Date(y,m+1,0).getDate();
  let working=0;
  for(let d=1;d<=days;d++){const day=new Date(y,m,d).getDay();if(day!==0&&day!==6)working++;}
  const hols=DB.holidays.filter(h=>h.date.startsWith(tod().slice(0,7))).length;
  return working-hols;}

function changeMgrCode(){var old=(g('mgr-old').value||'').trim().toUpperCase(),nw=(g('mgr-new').value||'').trim().toUpperCase(),msg=g('mgr-msg');if(!old||!nw){msg.style.color='var(--red)';msg.textContent='Both fields required.';return;}if(nw.length<4){msg.style.color='var(--red)';msg.textContent='Min 4 chars.';return;}if(old!==USER.code){msg.style.color='var(--red)';msg.textContent='Current code wrong.';return;}if(DB.empUsers.find(function(e){return e.code===nw&&e.id!==USER.id;})){msg.style.color='var(--red)';msg.textContent='Code taken.';return;}var emp=DB.empUsers.find(function(e){return e.id===USER.id;});if(emp)emp.code=nw;USER.code=nw;S.set('hanbee_user',USER);saveDB();msg.style.color='var(--green)';msg.textContent='Updated! New: '+nw;setTimeout(function(){var b=g('mgr-code-box');if(b)b.remove();},1500);}
function changeMgrPIN(){
  var pins=getPins();
  var key='mgr_'+USER.id;
  var oldPin=(g('mgr-pin-old')?g('mgr-pin-old').value||'':'');
  var newPin=(g('mgr-pin-new')?g('mgr-pin-new').value||'':'');
  var msg=g('mgr-pin-msg');
  if(!msg)return;
  if(newPin.length<4){msg.style.color='var(--red)';msg.textContent='PIN must be 4+ digits.';return;}
  if(!/^\d+$/.test(newPin)){msg.style.color='var(--red)';msg.textContent='Digits only.';return;}
  if(pins[key]&&oldPin!==pins[key]){msg.style.color='var(--red)';msg.textContent='Current PIN incorrect.';return;}
  pins[key]=newPin;savePins(pins);
  msg.style.color='var(--green)';msg.textContent='PIN updated!';
  if(g('mgr-pin-old'))g('mgr-pin-old').value='';
  if(g('mgr-pin-new'))g('mgr-pin-new').value='';
}

function getNextInvNo(){
  var y=new Date().getFullYear();
  var fy=new Date().getMonth()>=3?y:y-1;
  var fyStr=(String(fy).slice(-2))+(String(fy+1).slice(-2));
  var existing=DB.invoices.map(function(i){return i.invNo||'';});
  var nums=existing.map(function(n){var m=n.match(/(\d{4})$/);return m?parseInt(m[1]):0;});
  var next=nums.length>0?Math.max.apply(null,nums)+1:1;
  return 'INV-'+fyStr+'-'+String(next).padStart(4,'0');}

function getPins(){try{return JSON.parse(localStorage.getItem('hb_pins')||'{}');}catch(e){return {};}}

function checkLocked(uid){try{var lock=JSON.parse(localStorage.getItem('hb_lock_'+uid)||'null');if(!lock)return null;var rem=Math.ceil((lock.until-Date.now())/60000);if(rem<=0){localStorage.removeItem('hb_lock_'+uid);localStorage.removeItem('hb_att_'+uid);return null;}return rem;}catch(e){return null;}}
function recordFail(uid){var att=parseInt(localStorage.getItem('hb_att_'+uid)||'0')+1;localStorage.setItem('hb_att_'+uid,att);if(att>=5){localStorage.setItem('hb_lock_'+uid,JSON.stringify({until:Date.now()+30*60*1000}));localStorage.removeItem('hb_att_'+uid);return -1;}return 5-att;}
function hasPIN(uid){return !!getPins()[uid];}
function verifyPIN(uid,pin){return getPins()[uid]===pin;}
function setPIN(uid,pin){var p=getPins();p[uid]=pin;savePins(p);}
function adminUnlock(uid){localStorage.removeItem('hb_lock_'+uid);localStorage.removeItem('hb_att_'+uid);alert('Account unlocked.');}
function changeAdminPIN(){
  var pins=getPins();
  var key='admin_'+(USER?USER.id:1);
  var oldPin=(g('adm-pin-old')?g('adm-pin-old').value||'':'');
  var newPin=(g('adm-pin-new')?g('adm-pin-new').value||'':'');
  var confPin=(g('adm-pin-conf')?g('adm-pin-conf').value||'':'');
  var msg=g('adm-pin-msg');
  if(!msg)return;
  if(newPin.length<4){msg.style.color='var(--red)';msg.textContent='PIN must be at least 4 digits.';return;}
  if(!/^\d+$/.test(newPin)){msg.style.color='var(--red)';msg.textContent='Digits only.';return;}
  if(newPin!==confPin){msg.style.color='var(--red)';msg.textContent='PINs do not match.';return;}
  if(pins[key]&&oldPin!==pins[key]){msg.style.color='var(--red)';msg.textContent='Current PIN incorrect.';return;}
  pins[key]=newPin;savePins(pins);
  msg.style.color='var(--green)';msg.textContent='Admin PIN updated successfully!';
  ['adm-pin-old','adm-pin-new','adm-pin-conf'].forEach(function(id){if(g(id))g(id).value='';});
}

function getOfficeLoc(){try{return JSON.parse(localStorage.getItem('hb_office')||'null');}catch(e){return null;}}
function saveOfficeLoc(lat,lng,rad){localStorage.setItem('hb_office',JSON.stringify({lat:lat,lng:lng,radius:rad||200}));}
function calcDist(la1,lo1,la2,lo2){var R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function detectOfficeLoc(){
  if(!navigator.geolocation){alert('GPS not supported on this device.');return;}
  var rad=parseInt(g('office-radius')?g('office-radius').value:200)||200;
  navigator.geolocation.getCurrentPosition(function(p){
    saveOfficeLoc(p.coords.latitude,p.coords.longitude,rad);
    alert('Office location saved!\nLat: '+p.coords.latitude.toFixed(6)+'\nLng: '+p.coords.longitude.toFixed(6)+'\nRadius: '+rad+'m\n\nEmployees must be within this radius to clock in.');
    renderTab('brand');},function(e){alert('GPS error: '+e.message+'. Make sure GPS is enabled.');});}
function showClockMsg(msg,color){var el=g('clock-msg');if(el){el.style.color=color;el.textContent=msg;}}
function empClockIn(){
  var office=getOfficeLoc();var n=new Date();var h=n.getHours(),mn=n.getMinutes();
  var ts=String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');
  if(h<7||(h===7&&mn<30)||(h>=11)){showClockMsg('Clock-in allowed 7:30 AM to 11:00 AM only. Contact HR for manual entry.','var(--red)');return;}
  if(!office){showClockMsg('Office location not set. Ask Admin to set it in Settings.','var(--amber)');return;}
  if(!navigator.geolocation){showClockMsg('GPS not supported on this device.','var(--red)');return;}
  showClockMsg('Getting your location...','var(--text2)');
  navigator.geolocation.getCurrentPosition(function(p){
    var dist=calcDist(p.coords.latitude,p.coords.longitude,office.lat,office.lng);
    if(dist>office.radius){showClockMsg('You are '+Math.round(dist)+'m away. Must be within '+office.radius+'m of office.','var(--red)');return;}
    var td=tod();var ex=DB.timeLogs.find(function(l){return l.empId===USER.id&&l.date===td;});
    if(ex&&ex.timeIn){showClockMsg('Already clocked in at '+ex.timeIn+'.','var(--amber)');return;}
    if(!ex)DB.timeLogs.push({id:Date.now(),empId:USER.id,date:td,timeIn:ts,lunchMins:0,breakMins:0,gpsVerified:true});
    else{ex.timeIn=ts;ex.gpsVerified=true;}
    saveDB();showClockMsg('Clocked in at '+ts+' ('+Math.round(dist)+'m from office — GPS verified)','var(--green)');
    setTimeout(function(){renderEmpPortal();},1500);
  },function(e){showClockMsg('GPS error: '+e.message+'. Enable location and try again.','var(--red)');});}
function empClockOut(){
  var td=tod();var ex=DB.timeLogs.find(function(l){return l.empId===USER.id&&l.date===td;});
  if(!ex||!ex.timeIn){showClockMsg('You have not clocked in today.','var(--red)');return;}
  if(ex.timeOut){showClockMsg('Already clocked out at '+ex.timeOut+'.','var(--amber)');return;}
  var n=new Date();var ts=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  ex.timeOut=ts;saveDB();
  var mn=Math.round((new Date('2000-01-01T'+ts)-new Date('2000-01-01T'+ex.timeIn))/60000);
  var nt=mn-(ex.lunchMins||0)-(ex.breakMins||0);
  showClockMsg('Clocked out at '+ts+'. Total: '+Math.floor(nt/60)+'h '+(nt%60)+'m'+(nt>480?' (Overtime +'+Math.floor((nt-480)/60)+'h)':''),'var(--green)');
  setTimeout(function(){renderEmpPortal();},1500);}
function empLogLunch(){var td=tod();var log=DB.timeLogs.find(function(l){return l.empId===USER.id&&l.date===td;});if(!log||!log.timeIn){showClockMsg('Clock in first.','var(--red)');return;}var mn=parseInt(prompt('Lunch duration (minutes):','60'));if(isNaN(mn))return;log.lunchMins=mn;saveDB();showClockMsg('Lunch: '+mn+' minutes saved.','var(--green)');}
function empLogBreak(){var td=tod();var log=DB.timeLogs.find(function(l){return l.empId===USER.id&&l.date===td;});if(!log||!log.timeIn){showClockMsg('Clock in first.','var(--red)');return;}var mn=parseInt(prompt('Break duration (minutes):','15'));if(isNaN(mn))return;log.breakMins=(log.breakMins||0)+mn;saveDB();showClockMsg('Break: '+mn+' minutes saved.','var(--green)');}

function tPay(){
  var b=DB.brand;var mon=tod().slice(0,7);var y=parseInt(mon.slice(0,4)),m2=parseInt(mon.slice(5,7));
  var wd=0;for(var d=1;d<=new Date(y,m2,0).getDate();d++){var dy=new Date(y,m2-1,d).getDay();if(dy!==0&&dy!==6)wd++;}
  wd-=(DB.holidays||[]).filter(function(h){return h.date&&h.date.startsWith(mon);}).length;
  var emps=DB.empUsers.filter(function(e){return e.role==='employee';});
  var rows='';var tG=0,tPF=0,tESI=0,tTDS=0,tNet=0,tOT=0;
  emps.forEach(function(e){
    var ctc=e.salary||0;var basic=Math.round(ctc*0.7);
    var pres=DB.timeLogs.filter(function(l){return l.empId===e.id&&l.date.startsWith(mon);}).length;
    var earned=wd>0?Math.round(ctc*pres/wd):ctc;
    var otMins=0;
    DB.timeLogs.filter(function(l){return l.empId===e.id&&l.date.startsWith(mon)&&l.timeIn&&l.timeOut;}).forEach(function(l){
      var mn=Math.round((new Date('2000-01-01T'+l.timeOut)-new Date('2000-01-01T'+l.timeIn))/60000);
      var nt=mn-(l.lunchMins||0)-(l.breakMins||0);if(nt>480)otMins+=nt-480;});
    var hrRate=Math.round(ctc/26/8);var otCost=Math.round(otMins/60*hrRate*1.5);
    var pfEmp=ctc>0?Math.min(Math.round(basic*0.12),1800):0;
    var esiEmp=ctc>0&&ctc<=21000?Math.round(ctc*0.0075):0;
    var itD=DB.itDeclarations?DB.itDeclarations.find(function(d){return d.empId===e.id;}):null;
    var annDed=itD?Math.min((itD.pf80c||0)+(itD.lic||0)+(itD.ppf||0)+(itD.homeLoan||0)+(itD.nps||0)+(itD.other80c||0),150000)+(itD.hra||0)+(itD.mediclaim||0):pfEmp*12;
    var taxable=Math.max(0,ctc*12-annDed-50000);
    var annTax=taxable<=250000?0:taxable<=500000?(taxable-250000)*0.05:taxable<=1000000?12500+(taxable-500000)*0.2:112500+(taxable-1000000)*0.3;
    var tds=Math.round(annTax/12);
    var gross=earned+otCost;var net=gross-pfEmp-esiEmp-tds;
    tG+=gross;tPF+=pfEmp;tESI+=esiEmp;tTDS+=tds;tNet+=net;tOT+=otCost;
    rows+='<tr><td style="font-weight:600">'+e.name+'</td>'
      +'<td style="font-size:11px;color:var(--text2)">'+(e.designation||e.dept)+'</td>'
      +'<td style="font-size:12px;text-align:center">'+pres+'/'+wd+'</td>'
      +'<td>'+fmt(earned)+'</td>'
      +'<td style="color:'+(otCost>0?'var(--green)':'var(--text3)')+'">'+fmt(otCost)+'</td>'
      +'<td style="color:var(--red)">'+fmt(pfEmp)+'</td>'
      +'<td style="color:var(--red)">'+fmt(esiEmp)+'</td>'
      +'<td style="color:var(--red)">'+fmt(tds)+'</td>'
      +'<td style="font-weight:700;color:var(--green)">'+fmt(net)+'</td>'
      +'<td><button class="btn btn-sm" onclick="genSlip('+e.id+')">Slip</button>'
      +' <button class="btn btn-sm" onclick="calcGratuity('+e.id+')">Grat</button>'
      +' <button class="btn btn-sm" onclick="editEmployee('+e.id+')">Edit</button></td></tr>';
  });
  return '<div class="g4"><div class="metric"><div class="ml">Total gross payout</div><div class="mv">'+fmt(tG)+'</div></div>'
    +'<div class="metric"><div class="ml">Total PF deducted</div><div class="mv r">'+fmt(tPF)+'</div></div>'
    +'<div class="metric"><div class="ml">Total ESI deducted</div><div class="mv r">'+fmt(tESI)+'</div></div>'
    +'<div class="metric"><div class="ml">Total TDS deducted</div><div class="mv r">'+fmt(tTDS)+'</div></div>'
    +'</div><div class="g4"><div class="metric"><div class="ml">Net payout to employees</div><div class="mv g">'+fmt(tNet)+'</div></div>'
    +'<div class="metric"><div class="ml">Overtime cost</div><div class="mv a">'+fmt(tOT)+'</div></div>'
    +'<div class="metric"><div class="ml">Working days ('+mon+')</div><div class="mv">'+wd+'</div></div>'
    +'<div class="metric"><div class="ml">Total employees</div><div class="mv">'+emps.length+'</div></div>'

function tLeads(){
  var b=DB.brand;
  var won=DB.leads.filter(function(l){return l.status==='won';});
  var wonVal=won.reduce(function(s,l){return s+l.value;},0);
  var pipeline=DB.leads.filter(function(l){return l.status!=='won'&&l.status!=='lost';}).reduce(function(s,l){return s+l.value;},0);
  var today=tod();
  var overdue=DB.leads.filter(function(l){return l.followUp&&l.followUp<today&&l.status!=='won'&&l.status!=='lost';}).length;
  var stages=['new','contacted','qualified','proposal','negotiation','won','lost'];
  var sc={new:'xpn',contacted:'xi',qualified:'xdu',proposal:'xpn',negotiation:'xp',won:'xp',lost:'xo'};
  var funnel='<div class="card"><div class="st">Sales Funnel</div><div style="display:flex;gap:6px;flex-wrap:wrap">';
  stages.forEach(function(s2){
    var cnt=DB.leads.filter(function(l){return l.status===s2;}).length;
    var val=DB.leads.filter(function(l){return l.status===s2;}).reduce(function(s,l){return s+l.value;},0);
    funnel+='<div style="flex:1;min-width:70px;text-align:center;padding:10px 8px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)">'
      +'<div style="font-size:22px;font-weight:700;color:'+(s2==='won'?'var(--green)':s2==='lost'?'var(--red)':'var(--text)')+'">'+cnt+'</div>'
      +'<div style="font-size:10px;color:var(--text2);text-transform:uppercase;margin-top:2px">'+s2+'</div>'
      +(val>0?'<div style="font-size:10px;color:var(--text3)">'+fmt(val)+'</div>':'')
      +'</div>';});
  funnel+='</div></div>';
  var rows='';
  DB.leads.forEach(function(l){
    var isOD=l.followUp&&l.followUp<today&&l.status!=='won'&&l.status!=='lost';
    var priCls=l.priority==='Hot'?'xo':l.priority==='Warm'?'xi':'xpn';
    rows+='<tr>'
      +'<td><div style="font-weight:600">'+l.company+'</div><div style="font-size:11px;color:var(--text2)">'+(l.contact||'')+'</div></td>'
      +'<td>'+(l.priority?'<span class="bx '+priCls+'">'+l.priority+'</span>':'<span style="color:var(--text3);font-size:11px">--</span>')+'</td>'
      +'<td style="font-size:11px"><span class="bx xi">'+l.source+'</span></td>'
      +'<td style="color:var(--green)">'+fmt(l.value)+'</td>'
      +'<td><span class="bx '+(sc[l.status]||'xdu')+'">'+l.status+'</span></td>'
      +'<td style="font-size:11px;color:'+(isOD?'var(--red)':'var(--text)')+'">'+(l.followUp||'--')+(isOD?' !':'')+'</td>'
      +'<td style="font-size:11px;color:var(--text2)">'+(l.expectedClose||'--')+'</td>'
      +'<td style="display:flex;gap:3px;flex-wrap:wrap">'
      +'<select data-lid="'+l.id+'" onchange="updLead(+this.dataset.lid,this.value)" style="font-size:11px;padding:2px 4px;border-radius:6px;border:1px solid var(--border);background:var(--surface)">'+stages.map(function(s2){return '<option value="'+s2+'"'+(s2===l.status?' selected':'')+'>'+s2+'</option>';}).join('')+'</select>'
      +(l.phone?'<a href="https://wa.me/91'+l.phone.replace(/\D/g,'')+'" target="_blank" class="btn btn-sm" style="background:#25D366;color:#fff;border:none">WA</a>':'')
      +'<button class="btn btn-sm" onclick="showLeadActivity('+l.id+')" title="Activity log">Log</button>'
      +'<button class="btn btn-sm" onclick="editLeadModal('+l.id+')" title="Edit">Edit</button>'
      +'<button class="del" onclick="dLead('+l.id+')">x</button>'
      +'</td></tr>';
  });
  return '<div class="g4"><div class="metric"><div class="ml">Total leads</div><div class="mv">'+DB.leads.length+'</div></div>'
    +'<div class="metric"><div class="ml">Pipeline value</div><div class="mv a">'+fmt(pipeline)+'</div></div>'
    +'<div class="metric"><div class="ml">Won</div><div class="mv g">'+won.length+' ('+fmt(wonVal)+')</div></div>'
    +'<div class="metric"><div class="ml">Follow-up overdue</div><div class="mv '+(overdue>0?'r':'g')+'">'+overdue+'</div></div>'
    +'</div>'
    +funnel
    +'<div class="card"><div class="st">Add Lead</div>'
    +'<div class="fr c3"><div><label>Company *</label><input id="ld-co" placeholder="Company name"/></div><div><label>Contact person</label><input id="ld-ct" placeholder="Name"/></div><div><label>Phone (WhatsApp)</label><input id="ld-ph" placeholder="+91 98765 43210"/></div></div>'

    +'<div class="fr c3" style="margin-bottom:0"><div><label>Follow-up date</label><input type="date" id="ld-fu"/></div><div><label>Expected close date</label><input type="date" id="ld-ec"/></div><div><label>Notes</label><input id="ld-notes" placeholder="Any notes..."/></div></div>'
    +'<button class="btn btn-brand" style="background:'+b.color+';margin-top:10px;width:100%" onclick="aLead()">+ Add Lead</button></div>'
    +(DB.leads.length?'<div class="card" style="overflow-x:auto"><table><thead><tr><th>Company</th><th>Priority</th><th>Source</th><th>Value</th><th>Status</th><th>Follow up</th><th>Close date</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div>':'');}

function aLead(){
  var co=(g('ld-co').value||'').trim();if(!co)return;
  DB.leads.unshift({id:Date.now(),company:co,contact:(g('ld-ct').value||'').trim(),
    phone:(g('ld-ph').value||'').trim(),source:g('ld-src').value,
    priority:g('ld-pri').value,value:parseFloat(g('ld-val').value)||0,
    followUp:g('ld-fu').value,expectedClose:g('ld-ec').value,
    notes:(g('ld-notes').value||'').trim(),status:'new',activities:[]});
  saveDB();renderTab('leads');}

function updLead(id,status){
  var l=DB.leads.find(function(x){return x.id===id;});if(!l)return;
  if(status==='lost'&&!l.lostReason){var r=prompt('Why was this lead lost? (Price / Competitor / No budget / Other)','');if(r)l.lostReason=r;}
  l.status=status;saveDB();}

function addLeadActivity(id,box){
  var l=DB.leads.find(function(x){return x.id===id;});if(!l)return;

function showEditModal(title,fields,onSave){
  var box=document.createElement('div');
  box.id='edit-modal-'+Date.now();
  box.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem';
  var fHTML='';
  fields.forEach(function(f){
    var val=String(f.value||'').replace(/"/g,'&quot;');
    if(f.type==='select'){
      fHTML+='<div><label style="font-size:12px;color:var(--text2)">'+f.label+'</label><select id="ef-'+f.key+'" style="width:100%;margin-top:3px">';
      (f.options||[]).forEach(function(op){fHTML+='<option value="'+op+'"'+(op===String(f.value||'')?' selected':'')+'>'+op+'</option>';});
      fHTML+='</select></div>';
    } else if(f.type==='textarea'){
      fHTML+='<div style="grid-column:1/-1"><label style="font-size:12px;color:var(--text2)">'+f.label+'</label><textarea id="ef-'+f.key+'" style="width:100%;min-height:60px;margin-top:3px">'+String(f.value||'')+'</textarea></div>';
    } else {
      fHTML+='<div><label style="font-size:12px;color:var(--text2)">'+f.label+'</label><input id="ef-'+f.key+'" type="'+(f.type||'text')+'" value="'+val+'" style="width:100%;margin-top:3px"/></div>';
    }});
  var modalId=box.id;
  box.innerHTML='<div style="background:var(--surface);border-radius:14px;padding:1.5rem;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)">'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:14px">'+title+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+fHTML+'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-brand" style="flex:1;background:var(--brand)" id="esb-'+modalId+'">Save Changes</button>'
    +'<button class="btn" onclick="document.getElementById(\''+modalId+'\').remove()">Cancel</button>'
    +'</div></div>';
  document.body.appendChild(box);
  document.getElementById('esb-'+modalId).onclick=function(){
    var vals={};fields.forEach(function(f){var el=document.getElementById('ef-'+f.key);if(el)vals[f.key]=el.value;});
    onSave(vals);document.getElementById(modalId).remove();};}

function tInvestors(){
  if(!DB.investors)DB.investors=[];
  var totalCommitted=DB.investors.reduce(function(s,i){return s+(i.amount||0);},0);
  var totalReceived=DB.investors.reduce(function(s,i){return s+(i.returns||0);},0);
  var active=DB.investors.filter(function(i){return i.status==='active';}).length;
  var totalEquity=DB.investors.reduce(function(s,i){return s+(parseFloat(i.equity)||0);},0);
  var overallROI=totalCommitted>0?Math.round((totalReceived/totalCommitted)*100):0;
  var b=DB.brand;

  // ── METRICS ──
  var h='<div class="g4" style="margin-bottom:1rem">';
  h+='<div class="metric" style="border-left:4px solid '+b.color+'"><div class="ml">Total Investors</div>';
  h+='<div class="mv" style="font-size:22px">'+DB.investors.length+'</div>';
  h+='<div style="font-size:11px;color:var(--text2);margin-top:2px">'+active+' active</div></div>';
  h+='<div class="metric" style="border-left:4px solid #6366f1"><div class="ml">Total Committed</div>';
  h+='<div class="mv g" style="font-size:20px">'+fmt(totalCommitted)+'</div></div>';
  h+='<div class="metric" style="border-left:4px solid #10b981"><div class="ml">Total Received</div>';

function aInvestor(){
  var name=(g('inv-name').value||'').trim();
  var type=g('inv-type').value;
  var amount=parseFloat(g('inv-amount').value)||0;
  var date=g('inv-date').value;
  var equity=parseFloat(g('inv-equity').value)||0;
  var phone=(g('inv-phone').value||'').trim();
  var email=(g('inv-email').value||'').trim();
  var notes=(g('inv-notes').value||'').trim();
  var round=g('inv-round')?g('inv-round').value:'Seed';
  var status=g('inv-status')?g('inv-status').value:'active';
  var msg=g('inv-msg');
  if(!name){msg.style.color='var(--red)';msg.textContent='Investor name is required.';return;}
  if(!amount){msg.style.color='var(--red)';msg.textContent='Committed amount is required.';return;}
  var totalEq=(DB.investors||[]).reduce(function(s,i){return s+(parseFloat(i.equity)||0);},0)+equity;
  if(totalEq>100){msg.style.color='var(--red)';msg.textContent='Total equity exceeds 100% (currently '+totalEq.toFixed(1)+'%).';return;}
  if(!DB.investors)DB.investors=[];
  DB.investors.push({id:Date.now(),name:name,type:type,amount:amount,date:date,equity:equity,returns:0,phone:phone,email:email,notes:notes,round:round,status:status});
  saveDB();
  msg.style.color='var(--green)';msg.textContent='✓ Investor added successfully!';
  // Clear form
  ['inv-name','inv-email','inv-phone','inv-notes'].forEach(function(id){if(g(id))g(id).value='';});
  ['inv-amount','inv-equity'].forEach(function(id){if(g(id))g(id).value='';});
  setTimeout(function(){renderTab('investors');},100);}

function editInvestorFull(id){
  var inv=DB.investors.find(function(x){return x.id===id;});if(!inv)return;
  showEditModal('Edit Investor — '+inv.name,[
    {key:'name',label:'Investor Name',value:inv.name||''},
    {key:'type',label:'Type',type:'select',value:inv.type||'Angel',options:['Angel','VC','Angel Group','PE','Strategic','Family Office','Bootstrap','Grant','Government']},
    {key:'amount',label:'Total Committed (Rs)',type:'number',value:inv.amount||0},
    {key:'equity',label:'Equity %',type:'number',value:inv.equity||0},
    {key:'round',label:'Round',type:'select',value:inv.round||'Seed',options:['Pre-seed','Seed','Series A','Series B','Series C','Series D+','Bridge','Convertible Note','SAFE']},
    {key:'date',label:'Investment Date',type:'date',value:inv.date||tod()},
    {key:'email',label:'Email',type:'email',value:inv.email||''},
    {key:'phone',label:'Phone',value:inv.phone||''},
    {key:'status',label:'Status',type:'select',value:inv.status||'active',options:['active','exited','pending','inactive']},
    {key:'notes',label:'Notes',value:inv.notes||''},
  ],function(vals){
    Object.assign(inv,vals);
    inv.amount=parseFloat(vals.amount)||0;
    inv.equity=parseFloat(vals.equity)||0;
    saveDB();renderTab('investors');
  });}

function addInvestorReturn(id){
  var inv=DB.investors.find(function(x){return x.id===id;});if(!inv)return;
  var cur=inv.returns||0;
  showEditModal('Add Return Payment — '+inv.name,[
    {key:'newReturn',label:'New return payment to add (Rs)',type:'number',value:0},
    {key:'totalReturns',label:'OR set total returns paid so far (Rs)',type:'number',value:cur},
  ],function(vals){
    var add=parseFloat(vals.newReturn)||0;
    var total=parseFloat(vals.totalReturns)||0;
    if(add>0){inv.returns=(cur+add);}
    else if(total>=0){inv.returns=total;}
    saveDB();renderTab('investors');
  });}

function dInvestor(id){
  if(!confirm('Delete this investor record?'))return;
  DB.investors=DB.investors.filter(function(x){return x.id!==id;});
  saveDB();renderTab('investors');}

function editInvestorReturns(id){
  var inv=DB.investors.find(function(x){return x.id===id;});
  if(!inv)return;
  var nr=prompt('Update total returns paid so far for '+inv.name+' (current: '+inv.returns+'):',inv.returns||0);
  if(nr===null)return;
  var val=parseFloat(nr)||0;
  if(val<0){alert('Returns cannot be negative.');return;}
  if(val>inv.amount*3){if(!confirm('Returns seem very high ('+fmt(val)+'). Confirm?'))return;}
  inv.returns=val;
  saveDB();renderTab('investors');}

function genCapTable(){
  var totalInvested=DB.investors.reduce(function(s,i){return s+i.amount;},0);
  var totalEq=DB.investors.reduce(function(s,i){return s+(i.equity||0);},0);
  var promoterEq=Math.max(0,100-totalEq);
  var b=DB.brand;
  var w=window.open('','_blank');
  pdfHead(w);
  w.document.write('<h2>Capitalization Table</h2>');
  w.document.write('<p style="color:#666;font-size:13px;margin-bottom:20px">As of '+tod()+'</p>');
  w.document.write('<table><thead><tr><th>Stakeholder</th><th>Type</th><th>Round</th><th>Amount Invested</th><th>Equity %</th><th>Returns Paid</th><th>Status</th></tr></thead><tbody>');
  w.document.write('<tr><td style="font-weight:600">'+b.companyName+' (Founders)</td><td>Promoter</td><td>—</td><td style="font-weight:700">'+promoterEq+'%</td><td>—</td><td><span style="color:green">Active</span></td></tr>');
  DB.investors.forEach(function(inv){
    w.document.write('<tr><td style="font-weight:600">'+inv.name+'</td><td>'+inv.type+'</td><td style="color:#888">'+(inv.round||'—')+'</td><td>₹'+(inv.amount||0).toLocaleString('en-IN')+'</td><td style="font-weight:700">'+( inv.equity||0)+'%</td><td>₹'+(inv.returns||0).toLocaleString('en-IN')+'</td><td>'+inv.status+'</td></tr>');
  });
  w.document.write('<tr style="font-weight:700;background:#f4f6f9"><td colspan="2">Total</td><td>₹'+totalInvested.toLocaleString('en-IN')+'</td><td>100%</td><td>—</td><td></td></tr>');
  w.document.write('</tbody></table>');
  w.document.write('<p style="margin-top:24px;font-size:12px;color:#666">This cap table is for reference only. Verify with your legal counsel.</p>');
  w.document.write('</body></html>');
  w.document.close();w.print();}

function aCamp(){

  if(!n){alert('Campaign name required.');return;}
  DB.campaigns.push({id:Date.now(),name:n,channel:ch,budget:bud,spent:sp,leads:ld,conversions:cv,revenue:rv,status:st,date:tod()});

}

(function migratDB(){
  var saved = S.get('hanbee_db');
  if(saved){
    // If empUsers are missing, empty, or have wrong structure (PIN-based old version)
    var eu = saved.empUsers || [];
    var hasAdmin = eu.find(function(e){return e.role==='admin';});
    var hasStale = eu.find(function(e){return e.hasOwnProperty('pin') || e.hasOwnProperty('pinHash');});
    if(!hasAdmin || hasStale || eu.length < 5){
      // Reset empUsers to DEFDB but preserve all other data
      saved.empUsers = JSON.parse(JSON.stringify(DEFDB.empUsers));
      if(!saved.investors) saved.investors = JSON.parse(JSON.stringify(DEFDB.investors));
      S.set('hanbee_db', saved);
      DB = saved;
      console.log('[Hanbee] empUsers migrated to new schema');
    }
    // Ensure investors array exists
    if(!DB.investors) { DB.investors = JSON.parse(JSON.stringify(DEFDB.investors)); saveDB(); }
    // Ensure marketing manager exists
    if(!DB.empUsers.find(function(e){return e.role==='marketing';})){
      DB.empUsers.push({id:6,name:'Marketing Manager',code:'MKT001',role:'marketing',dept:'Marketing'});
      saveDB();
    }
  }
})();
initDark();
applyBrand();
renderLoginForm();
var _su=S.get('hanbee_user');
if(_su&&_su.loginTime&&(Date.now()-_su.loginTime)/3600000<=8){
  var _valid=DB.empUsers.find(function(e){return e.id===_su.id&&e.code===_su.code;});
  if(_valid){USER=_valid;USER.loginTime=_su.loginTime;
    if(_valid.role==='admin'){showAdminDash();setTimeout(checkBackupReminder,2000);}
    else if(_valid.role==='finance'||_valid.role==='hr'){showManagerDash();}
    else if(_valid.role==='marketing'){showMarketingDash();}
    else showEmpPortal();}
} else if(_su){S.set('hanbee_user',null);renderLoginForm();}
</script>
